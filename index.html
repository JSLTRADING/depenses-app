// Mots-clés pour catégorisation automatique locale
const CAT_KEYWORDS = {
  alimentation: ["monoprix","franprix","lidl","aldi","carrefour","leclerc","intermarché","super u","casino","courses","épicerie","boulangerie","boucherie","marché","picard","biocoop","naturalia","sushi","snack","sandwicherie","mcdo","mcdonald","burger","pizza","kebab","déjeuner","diner","petit-déjeuner","repas","nourriture","manger"],
  enfant: ["école","crèche","nourrice","babysitter","jouet","jeux","kid","enfant","maternelle","primaire","cantine","garderie","activité","dessin","sport enfant","zara kids","jacadi","dpam","kiabi enfant"],
  transport: ["navigo","ratp","sncf","train","métro","bus","tram","taxi","uber","bolt","essence","carburant","gazole","total","esso","bp","shell","parking","péage","autoroute","vélib","trottin"],
  maison: ["loyer","edf","engie","eau","électricité","gaz","internet","sfr","orange","free","bouygues","ikea","leroy","castorama","bricolage","jardinage","entretien","ménage","réparation","plombier","électricien","maison","jardin"],
  mode: ["vêtement","chaussure","sac","zara","h&m","mango","shein","asos","primark","balenciaga","louboutin","vinted","mode","accessoire","bijou"],

  sante: ["pharmacie","médecin","docteur","dentiste","kiné","ophtalmo","mutuelle","ordonnance","médicament","santé","clinique","hôpital","infirmier","ostéo","psy"],
  restaurant: ["restaurant","brasserie","bistrot","café","bisto","sushi","ramen","pizzeria","trattoria","gastronomique","déjeuner au","diner au","dîner au","addition","terrasse","uber eats","deliveroo","just eat","doordash"],
};

const guessCategorie = (text) => {
  const t = text.toLowerCase();
  for (const [cat, keywords] of Object.entries(CAT_KEYWORDS)) {
    if (keywords.some(k => t.includes(k))) return cat;
  }
  return "autres";
};

// Extraction locale : montant + marchand depuis le texte vocal
const extraireDepense = (text) => {
  const t = text.trim();

  // Montant : gère tous les formats vocaux courants
  let montant = 0;
  // Pattern 1 : "3,80€" "3.80 euros"
  const m1 = t.match(/(\d+)[,\.](\d+)\s*(?:€|euros?)/i);
  if (m1) { montant = parseFloat(m1[1] + "." + m1[2]); }
  else {
    // Pattern 2 : "3 euros 80" → entier + centimes séparés
    const m2 = t.match(/(\d+)\s*(?:€|euros?)\s*(\d+)/i);
    if (m2) { montant = parseFloat(m2[1] + "." + m2[2].padEnd(2,"0")); }
    else {
      // Pattern 3 : "3€" "25 euros" sans centimes
      const m3 = t.match(/(\d+)\s*(?:€|euros?)/i);
      if (m3) { montant = parseFloat(m3[1]); }
      else {
        // Pattern 4 : "20 centimes" "0,20 centime"
        const m4 = t.match(/(\d+)[,\.](\d+)\s*centimes?/i);
        if (m4) { montant = parseFloat("0." + m4[2]); }
        else {
          const m5 = t.match(/(\d+)\s*centimes?/i);
          if (m5) { montant = parseFloat(m5[1]) / 100; }
        }
      }
    }
  }

  // Marchand : après "chez / à / au / chez le / chez la" ou nom connu en début/fin
  let marchand = "";
  const chezMatch = t.match(/(?:chez|à l['']|au|chez l['']|chez le|chez la)\s+([A-Za-zÀ-ÿ'\-\s]+?)(?:\s+pour|\s+\d|\s*€|$)/i);
  if (chezMatch) {
    marchand = chezMatch[1].trim();
  } else {
    // Cherche un nom de marchand connu directement dans le texte
    const ENSEIGNES = ["intermarché","intermarch","monoprix","franprix","lidl","aldi","carrefour","leclerc","super u","casino","picard","biocoop","naturalia","ikea","leroy merlin","castorama","total","esso","shell","bp","sncf","ratp","navigo","amazon","fnac","decathlon","zara","h&m","mango","mc do","mcdonald","burger king","pizza"];
    for (const e of ENSEIGNES) {
      if (t.toLowerCase().includes(e)) {
        marchand = e.charAt(0).toUpperCase() + e.slice(1);
        break;
      }
    }
  }

  const categorie = guessCategorie(t);
  return { montant, marchand, categorie };
};

const fmt = (n) => new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR" }).format(n);
const fmtDate = (d) => new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "short" });
const getCat = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];

// === SUPABASE ===
const SB_URL = "https://fvbiiprbihrvubqvnkuf.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2YmlpcHJiaWhydnVicXZua3VmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MzUzMzksImV4cCI6MjA5NzAxMTMzOX0.ab_8DoiQcFvXvOUK2PFGwg8cW4e4MUxYX6F81z5U640";
const sbHeaders = { "Content-Type": "application/json", "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };

const sbFetch = async (path, opts = {}) => {
  const res = await fetch(SB_URL + path, { headers: sbHeaders, ...opts });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return res.status === 204 ? null : res.json();
};

const BUDGET_KEY      = "depenses_budget_v1";
const BUDGETS_CAT_KEY = "depenses_budgets_cat_v1";
const loadB    = () => { try { return parseFloat(localStorage.getItem(BUDGET_KEY)) || 3000; } catch { return 3000; } };
const loadBCat = () => { try { return JSON.parse(localStorage.getItem(BUDGETS_CAT_KEY)) || {}; } catch { return {}; } };
const saveBCat = (b) => { try { localStorage.setItem(BUDGETS_CAT_KEY, JSON.stringify(b)); } catch {} };

  const [lastAdded, setLastAdded]   = useState(null);
  const [expandedCat, setExpandedCat] = useState(null);
  const [histoMois, setHistoMois] = useState(() => {
    const n = new Date(); return n.getFullYear() + "-" + String(n.getMonth() + 1).padStart(2,"0");
  });
  const [budgetsCat, setBudgetsCat] = useState(loadBCat);
  const [budgetsCatEdit, setBudgetsCatEdit] = useState({});
  const recRef = useRef(null);

  const saveBudgetCat = (catId, val) => {
    const n = parseFloat(val);
    const next = { ...budgetsCat };
    if (!n || n <= 0) { delete next[catId]; } else { next[catId] = n; }
    setBudgetsCat(next);
    saveBCat(next);
    setBudgetsCatEdit(prev => ({ ...prev, [catId]: false }));
  };

  // Charger depuis Supabase au démarrage
  useEffect(() => {
    sbFetch("/rest/v1/depenses?select=*&order=date.desc")
      .then(data => { setDepenses(data || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const addToSupabase = async (dep) => {
    setSyncing(true);
    try {
      await sbFetch("/rest/v1/depenses", {
        method: "POST",
        body: JSON.stringify({ id: dep.id, montant: dep.montant, categorie: dep.categorie, marchand: dep.marchand || "", note: dep.note || "", date: dep.date })
      });
      setDepenses(prev => [dep, ...prev]);
      setLastAdded(dep);
    } catch(e) { alert("Erreur sync : " + e.message); }
    setSyncing(false);
  };

  const deleteFromSupabase = async (id) => {
    setSyncing(true);
    try {
      await sbFetch("/rest/v1/depenses?id=eq." + id, { method: "DELETE" });
      setDepenses(prev => prev.filter(d => d.id !== id));
    } catch(e) { alert("Erreur lors de la suppression."); }
    setSyncing(false);
  };

  const saveBudget = (val) => {
    const n = parseFloat(val); if (!n || n <= 0) return;
    setBudget(n); try { localStorage.setItem(BUDGET_KEY, String(n)); } catch {}
    setBudgetEdit(false);
  };

  const now = new Date();
  const moisDeps = depenses.filter(d => { const dt = new Date(d.date); return dt.getMonth() === now.getMonth() && dt.getFullYear() === now.getFullYear(); });
  const totalMois = moisDeps.reduce((s, d) => s + d.montant, 0);
  const pct = Math.min((totalMois / budget) * 100, 100);
  const couleur = pct > 90 ? "#E07070" : pct > 70 ? "#E8A87C" : "#7EC8C8";
  const parCat = CATEGORIES.map(cat => ({ ...cat, total: moisDeps.filter(d => d.categorie === cat.id).reduce((s, d) => s + d.montant, 0) })).filter(c => c.total > 0).sort((a, b) => b.total - a.total);

  // === VOCAL ===
  const startListening = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Utilise Chrome pour la saisie vocale."); return; }
    const rec = new SR();
    rec.lang = "fr-FR"; rec.continuous = false; rec.interimResults = false;
    rec.onstart = () => setIsListening(true);
    rec.onresult = (e) => {
      const text = e.results[0][0].transcript;
      setIsListening(false);
      const extracted = extraireDepense(text);
      // Ouvre le formulaire de confirmation pré-rempli
      const norm = (s) => s ? s.trim().charAt(0).toUpperCase() + s.trim().slice(1).toLowerCase() : s;
      setConfirm({ transcript: text, ...extracted, marchand: norm(extracted.marchand) });
      setView("saisie");
    };
    rec.onerror = rec.onend = () => setIsListening(false);
    recRef.current = rec;
    rec.start();
  };

  // Confirmer depuis le modal vocal
  const confirmerVocal = () => {
    const m = parseFloat(confirm.montant);
    if (!m || m <= 0) return;
    const normM = (s) => s ? s.trim().charAt(0).toUpperCase() + s.trim().slice(1).toLowerCase() : s;
    const dep = { id: Date.now(), montant: m, categorie: confirm.categorie, marchand: normM(confirm.marchand), note: confirm.transcript, date: new Date().toISOString() };
    addToSupabase(dep);
    setConfirm(null);
    setView("dashboard");
  };

  // Ajouter manuel
  const ajouterManuel = () => {
    const m = parseFloat(form.montant); if (!m || m <= 0) return;
    const normF = (s) => s ? s.trim().charAt(0).toUpperCase() + s.trim().slice(1).toLowerCase() : s;
    const dep = { id: Date.now(), montant: m, categorie: form.categorie, marchand: normF(form.marchand), note: form.note, date: new Date().toISOString() };
    addToSupabase(dep);
    setForm({ montant: "", categorie: "alimentation", marchand: "", note: "" });
    setView("dashboard");
  };

  const supprimer = (id) => deleteFromSupabase(id);

  const card = { background: "#fff", borderRadius: 14, padding: 16, marginBottom: 16, boxShadow: "0 2px 8px rgba(0,0,0,0.05)" };

  const CatGrid = ({ selected, onChange }) =>
    React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6 } },
      CATEGORIES.map(cat => React.createElement("button", {
        key: cat.id, onClick: () => onChange(cat.id),
        style: { padding: "8px 4px", borderRadius: 8, border: "1.5px solid", borderColor: selected === cat.id ? cat.color : "#eee", background: selected === cat.id ? cat.color + "22" : "#fff", cursor: "pointer", textAlign: "center" }
      },
        React.createElement("div", { style: { fontSize: 18 } }, cat.emoji),
        React.createElement("div", { style: { fontSize: 9, marginTop: 2, fontWeight: 600, color: "#444", lineHeight: 1.2 } }, cat.label)
      ))
    );

  return React.createElement("div", { style: { fontFamily: "-apple-system, Inter, sans-serif", background: "#F8F6F3", minHeight: "100vh" } },

    // === HEADER ===
    React.createElement("div", { style: { background: "#1C1C1E", padding: "20px 20px 14px", position: "sticky", top: 0, zIndex: 10 } },
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
        React.createElement("div", null,
          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 6 } }, React.createElement("div", { style: { color: "#A1607D", fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase" } }, "Mes dépenses"), (syncing || loading) && React.createElement("div", { style: { fontSize: 9, color: "#666", fontStyle: "italic" } }, loading ? "chargement..." : "sync...")),
          React.createElement("div", { style: { color: "#fff", fontSize: 20, fontWeight: 700, marginTop: 2 } }, now.toLocaleDateString("fr-FR", { month: "long", year: "numeric" }))
        ),
        React.createElement("div", { style: { textAlign: "right" } },
          React.createElement("div", { style: { color: "#666", fontSize: 10 } }, "ce mois"),
          React.createElement("div", { style: { color: "#fff", fontSize: 22, fontWeight: 800 } }, fmt(totalMois))
        )
      ),
      React.createElement("div", { style: { marginTop: 12, background: "#333", borderRadius: 6, height: 6, overflow: "hidden" } },
        React.createElement("div", { style: { width: pct + "%", background: couleur, height: "100%", borderRadius: 6, transition: "width 0.5s" } })
      ),
      React.createElement("div", { style: { display: "flex", justifyContent: "space-between", marginTop: 4 } },
        React.createElement("div", { style: { color: "#555", fontSize: 10 } }, "Budget " + fmt(budget)),
        budgetEdit
          ? React.createElement("div", { style: { display: "flex", gap: 4, alignItems: "center" } },
              React.createElement("input", { type: "number", value: budgetInput, autoFocus: true, onChange: e => setBudgetInput(e.target.value), onKeyDown: e => { if (e.key === "Enter") saveBudget(budgetInput); if (e.key === "Escape") setBudgetEdit(false); }, style: { width: 80, padding: "2px 6px", fontSize: 11, borderRadius: 4, border: "1px solid #A1607D", background: "#2a2a2c", color: "#fff", outline: "none" } }),
              React.createElement("button", { onClick: () => saveBudget(budgetInput), style: { background: "#A1607D", border: "none", color: "#fff", borderRadius: 4, padding: "2px 8px", fontSize: 10, cursor: "pointer" } }, "OK"),
              React.createElement("button", { onClick: () => setBudgetEdit(false), style: { background: "none", border: "none", color: "#666", fontSize: 14, cursor: "pointer" } }, "×")
            )
          : React.createElement("button", { onClick: () => { setBudgetInput(String(budget)); setBudgetEdit(true); }, style: { background: "none", border: "none", color: couleur, fontSize: 10, fontWeight: 700, cursor: "pointer", textDecoration: "underline dotted" } }, Math.round(pct) + "% utilisé ✎")
      )
    ),

    // === NOTIF ===
    lastAdded && React.createElement("div", { style: { margin: "10px 14px 0", background: "#E8F5E9", borderRadius: 10, padding: "9px 12px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
      React.createElement("div", { style: { fontSize: 13, color: "#2E7D32" } }, "✓ ", React.createElement("strong", null, fmt(lastAdded.montant)), " ajouté — ", getCat(lastAdded.categorie).label),
      React.createElement("button", { onClick: () => setLastAdded(null), style: { background: "none", border: "none", color: "#999", fontSize: 18, cursor: "pointer" } }, "×")
    ),

    // === LOADING ===
    loading && React.createElement("div", { style: { textAlign: "center", padding: 60, color: "#bbb", fontSize: 14 } }, "Chargement des dépenses..."),

    // === TABS ===
    !loading && React.createElement("div", { style: { display: "flex", padding: "12px 14px 0" } },
      [{ id: "dashboard", label: "Vue" }, { id: "historique", label: "Historique" }, { id: "budgets", label: "Budgets" }, { id: "saisie", label: "+ Ajouter" }].map(tab =>
        React.createElement("button", { key: tab.id, onClick: () => { setConfirm(null); setView(tab.id); }, style: { flex: 1, padding: "8px 2px", fontSize: 11, fontWeight: 700, border: "none", cursor: "pointer", borderBottom: view === tab.id ? "2px solid #A1607D" : "2px solid transparent", background: "transparent", color: view === tab.id ? "#A1607D" : "#999" } }, tab.label)
      )

    !loading && React.createElement("div", { style: { padding: 14 } },

      // === DASHBOARD ===

            style: { width: 76, height: 76, borderRadius: "50%", background: isListening ? "#A1607D" : "#A1607D", border: "none", cursor: "pointer", fontSize: 28, boxShadow: "0 4px 20px rgba(161,96,125,0.4)", transition: "all 0.3s" }

        // Répartition
        React.createElement("div", { style: card },

            : parCat.map(cat => {

                moisDeps.filter(d => d.categorie === cat.id).forEach(d => {
                  const raw = (d.marchand || "Sans nom").trim();

                  marchands[m] = (marchands[m] || 0) + d.montant;
                });
                const marchandList = Object.entries(marchands).sort((a,b) => b[1]-a[1]);
                return React.createElement("div", { key: cat.id, style: { marginBottom: 10 } },
                  // Ligne catégorie cliquable
                  React.createElement("button", {
                    onClick: () => setExpandedCat(isOpen ? null : cat.id),
                    style: { width: "100%", background: "none", border: "none", cursor: "pointer", padding: 0 }

                        React.createElement("div", { style: { fontSize: 10, color: "#bbb", transition: "transform 0.2s", transform: isOpen ? "rotate(180deg)" : "rotate(0deg)" } }, "▾")

                    ),
                    React.createElement("div", { style: { background: "#F0EDE9", borderRadius: 4, height: 5, overflow: "hidden" } },
                      React.createElement("div", { style: { width: (cat.total / totalMois * 100) + "%", background: cat.color, height: "100%", borderRadius: 4 } })
                    ),
                    budgetsCat[cat.id] && React.createElement("div", { style: { display: "flex", justifyContent: "flex-end", marginTop: 3 } },
                      (() => {
                        const pctCat = Math.round((cat.total / budgetsCat[cat.id]) * 100);
                        const coul = pctCat > 100 ? "#E07070" : pctCat > 80 ? "#E8A87C" : "#7EC8C8";
                        return React.createElement("div", { style: { fontSize: 10, color: coul, fontWeight: 700 } },
                          pctCat > 100 ? "⚠️ " : "", pctCat + "% du budget " + fmt(budgetsCat[cat.id])

                      })()
                    )
                  ),
                  // Détail marchands (accordéon)
                  isOpen && marchandList.length > 0 && React.createElement("div", { style: { marginTop: 8, paddingLeft: 10, borderLeft: "2px solid " + cat.color } },
                    marchandList.map(([nom, total]) => {
                      const pctM = Math.round((total / cat.total) * 100);
                      return React.createElement("div", { key: nom, style: { padding: "7px 0", borderBottom: "1px solid #F5F2EF" } },
                        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 } },
                          React.createElement("div", { style: { fontSize: 12, color: "#444", fontWeight: 600 } }, nom),
                          React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                            React.createElement("div", { style: { fontSize: 11, color: "#999", fontWeight: 600 } }, pctM + "%"),
                            React.createElement("div", { style: { fontSize: 12, fontWeight: 700, color: "#333" } }, fmt(total))
                          )
                        ),
                        React.createElement("div", { style: { background: "#F0EDE9", borderRadius: 3, height: 3, overflow: "hidden" } },
                          React.createElement("div", { style: { width: pctM + "%", background: cat.color, height: "100%", borderRadius: 3 } })
                        )
                      );
                    })
                  )
                );
              })
        ),

        // Dernières
        React.createElement("div", { style: card },
          React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: "#1C1C1E", marginBottom: 12 } }, "Dernières saisies"),
          depenses.length === 0
            ? React.createElement("div", { style: { color: "#bbb", fontSize: 13, textAlign: "center", padding: "16px 0" } }, "Appuie sur 🎙️ pour commencer")
            : depenses.slice(0, 5).map(d => {
                const cat = getCat(d.categorie);
                return React.createElement("div", { key: d.id, style: { display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: "1px solid #F5F2EF" } },
                  React.createElement("div", { style: { width: 36, height: 36, borderRadius: 10, background: cat.color + "33", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, flexShrink: 0 } }, cat.emoji),
                  React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                    React.createElement("div", { style: { fontSize: 13, fontWeight: 600, color: "#1C1C1E", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, d.marchand || cat.label),
                    React.createElement("div", { style: { fontSize: 11, color: "#bbb" } }, fmtDate(d.date) + " · " + cat.label)
                  ),
                  React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: "#1C1C1E", flexShrink: 0 } }, fmt(d.montant))
                );
              }),
          depenses.length > 5 && React.createElement("button", { onClick: () => setView("historique"), style: { width: "100%", marginTop: 10, padding: 8, background: "none", border: "none", color: "#A1607D", fontSize: 12, fontWeight: 700, cursor: "pointer" } }, "Voir tout →")
        )
      ),

      // === HISTORIQUE ===
      view === "historique" && React.createElement("div", null,

        // Sélecteur de mois
        (() => {
          // Générer la liste des mois distincts dans les dépenses + mois courant
          const moisSet = new Set(depenses.map(d => { const dt = new Date(d.date); return dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0"); }));
          const now2 = new Date();
          moisSet.add(now2.getFullYear() + "-" + String(now2.getMonth()+1).padStart(2,"0"));
          const moisList = Array.from(moisSet).sort((a,b) => b.localeCompare(a));
          const fmtMoisLabel = (ym) => { const [y,m] = ym.split("-"); return new Date(y, m-1, 1).toLocaleDateString("fr-FR", { month: "long", year: "numeric" }); };
          const depFiltrees = depenses.filter(d => { const dt = new Date(d.date); const ym = dt.getFullYear() + "-" + String(dt.getMonth()+1).padStart(2,"0"); return ym === histoMois; });
          const totalFiltré = depFiltrees.reduce((s,d) => s + d.montant, 0);
          const idxCourant = moisList.indexOf(histoMois);

          return React.createElement("div", null,
            // Nav mois
            React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 } },
              React.createElement("button", {
                onClick: () => { if (idxCourant < moisList.length - 1) setHistoMois(moisList[idxCourant + 1]); },
                disabled: idxCourant >= moisList.length - 1,
                style: { background: "none", border: "none", fontSize: 20, cursor: "pointer", color: idxCourant >= moisList.length - 1 ? "#ddd" : "#A1607D", padding: "0 8px" }
              }, "‹"),
              React.createElement("div", { style: { textAlign: "center" } },
                React.createElement("div", { style: { fontSize: 14, fontWeight: 700, color: "#1C1C1E", textTransform: "capitalize" } }, fmtMoisLabel(histoMois)),
                React.createElement("div", { style: { fontSize: 12, color: "#A1607D", fontWeight: 700 } }, fmt(totalFiltré) + " · " + depFiltrees.length + " dépense" + (depFiltrees.length > 1 ? "s" : ""))
              ),
              React.createElement("button", {
                onClick: () => { if (idxCourant > 0) setHistoMois(moisList[idxCourant - 1]); },
                disabled: idxCourant <= 0,
                style: { background: "none", border: "none", fontSize: 20, cursor: "pointer", color: idxCourant <= 0 ? "#ddd" : "#A1607D", padding: "0 8px" }
              }, "›"),
            ),

            // Liste dépenses du mois sélectionné
            depFiltrees.length === 0
              ? React.createElement("div", { style: { ...card, textAlign: "center", color: "#bbb", padding: 32 } }, "Aucune dépense ce mois")
              : depFiltrees.map(d => {
                  const cat = getCat(d.categorie);
                  return React.createElement("div", { key: d.id, style: { ...card, marginBottom: 8, display: "flex", alignItems: "center", gap: 12, padding: 12 } },
                    React.createElement("div", { style: { width: 40, height: 40, borderRadius: 10, background: cat.color + "33", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 } }, cat.emoji),
                    React.createElement("div", { style: { flex: 1, minWidth: 0 } },
                      React.createElement("div", { style: { fontSize: 14, fontWeight: 600 } }, d.marchand || cat.label),
                      React.createElement("div", { style: { fontSize: 11, color: "#bbb" } }, fmtDate(d.date) + " · " + cat.label),
                      d.note && React.createElement("div", { style: { fontSize: 11, color: "#ccc", fontStyle: "italic", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, d.note)
                    ),
                    React.createElement("div", { style: { textAlign: "right", flexShrink: 0 } },
                      React.createElement("div", { style: { fontSize: 15, fontWeight: 700 } }, fmt(d.montant)),
                      React.createElement("button", { onClick: () => supprimer(d.id), style: { background: "none", border: "none", color: "#ddd", fontSize: 18, cursor: "pointer" } }, "×")
                    )
                  );
                })
          );
        })()
      ),

      // === BUDGETS PAR CATÉGORIE ===
      view === "budgets" && React.createElement("div", null,
        React.createElement("div", { style: { fontSize: 12, color: "#999", marginBottom: 14 } }, "Définis un budget mensuel par catégorie. Une alerte s'affiche si tu dépasses."),
        CATEGORIES.map(cat => {
          const depCat = moisDeps.filter(d => d.categorie === cat.id).reduce((s,d) => s + d.montant, 0);
          const budCat = budgetsCat[cat.id] || 0;
          const pctCat = budCat > 0 ? Math.min((depCat / budCat) * 100, 100) : 0;
          const coulCat = pctCat > 100 ? "#E07070" : pctCat > 80 ? "#E8A87C" : "#7EC8C8";
          const isEditing = budgetsCatEdit[cat.id];
          return React.createElement("div", { key: cat.id, style: { ...card, marginBottom: 10, padding: 14 } },
            React.createElement("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: budCat > 0 ? 10 : 0 } },
              React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                React.createElement("div", { style: { fontSize: 22 } }, cat.emoji),
                React.createElement("div", null,
                  React.createElement("div", { style: { fontSize: 13, fontWeight: 700, color: "#1C1C1E" } }, cat.label),
                  React.createElement("div", { style: { fontSize: 11, color: "#aaa" } }, depCat > 0 ? "Dépensé : " + fmt(depCat) : "Aucune dépense ce mois")
                )
              ),
              isEditing
                ? React.createElement("div", { style: { display: "flex", gap: 4, alignItems: "center" } },
                    React.createElement("input", {
                      type: "number", placeholder: "0", autoFocus: true,
                      defaultValue: budCat || "",
                      id: "budcat-" + cat.id,
                      style: { width: 80, padding: "4px 8px", fontSize: 13, borderRadius: 6, border: "1.5px solid #A1607D", outline: "none" },
                      onKeyDown: e => { if (e.key === "Enter") saveBudgetCat(cat.id, e.target.value); if (e.key === "Escape") setBudgetsCatEdit(p => ({...p, [cat.id]: false})); }
                    }),
                    React.createElement("button", { onClick: () => { const v = document.getElementById("budcat-"+cat.id).value; saveBudgetCat(cat.id, v); }, style: { background: "#A1607D", border: "none", color: "#fff", borderRadius: 6, padding: "4px 8px", fontSize: 11, cursor: "pointer" } }, "OK"),
                    React.createElement("button", { onClick: () => setBudgetsCatEdit(p => ({...p, [cat.id]: false})), style: { background: "none", border: "none", color: "#bbb", fontSize: 16, cursor: "pointer" } }, "×")
                  )
                : React.createElement("button", {
                    onClick: () => setBudgetsCatEdit(p => ({...p, [cat.id]: true})),
                    style: { background: budCat > 0 ? "#F0EDE9" : "#A1607D22", border: "none", borderRadius: 6, padding: "4px 10px", fontSize: 11, fontWeight: 700, color: budCat > 0 ? "#555" : "#A1607D", cursor: "pointer" }
                  }, budCat > 0 ? fmt(budCat) + " ✎" : "+ Budget")
            ),
            budCat > 0 && React.createElement("div", null,
              React.createElement("div", { style: { background: "#F0EDE9", borderRadius: 4, height: 6, overflow: "hidden", marginBottom: 4 } },
                React.createElement("div", { style: { width: pctCat + "%", background: coulCat, height: "100%", borderRadius: 4, transition: "width 0.4s" } })
              ),
              React.createElement("div", { style: { display: "flex", justifyContent: "space-between" } },
                React.createElement("div", { style: { fontSize: 10, color: coulCat, fontWeight: 700 } },
                  pctCat >= 100 ? "⚠️ Dépassé de " + fmt(depCat - budCat) : Math.round(pctCat) + "% utilisé"
                ),
                React.createElement("div", { style: { fontSize: 10, color: "#aaa" } }, "Reste : " + fmt(Math.max(budCat - depCat, 0)))
              )
            )
          );
        })
      ),

      // === SAISIE ===
      view === "saisie" && React.createElement("div", null,

        // === MODAL CONFIRMATION VOCAL ===
        confirm && React.createElement("div", { style: { ...card, borderLeft: "3px solid #A1607D", marginBottom: 16 } },
          React.createElement("div", { style: { fontSize: 11, color: "#A1607D", fontWeight: 700, marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 } }, "🎙️ Tu as dit"),
          React.createElement("div", { style: { fontSize: 13, color: "#555", fontStyle: "italic", marginBottom: 14 } }, "« " + confirm.transcript + " »"),

          // Montant
          React.createElement("div", { style: { marginBottom: 12 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 4 } }, "Montant (€)"),
            React.createElement("input", {
              type: "number", value: confirm.montant || "", autoFocus: true,
              onChange: e => setConfirm({ ...confirm, montant: e.target.value }),
              style: { width: "100%", padding: "10px 12px", border: "1.5px solid #A1607D", borderRadius: 8, fontSize: 20, fontWeight: 800 }
            })
          ),

          // Marchand
          React.createElement("div", { style: { marginBottom: 12 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 4 } }, "Marchand"),
            React.createElement("input", {
              type: "text", value: confirm.marchand || "", placeholder: "Ex: Lidl, RATP...",
              onChange: e => setConfirm({ ...confirm, marchand: e.target.value }),
              style: { width: "100%", padding: "10px 12px", border: "1.5px solid #eee", borderRadius: 8, fontSize: 14 }
            })
          ),

          // Catégorie
          React.createElement("div", { style: { marginBottom: 16 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 6 } }, "Catégorie détectée — modifie si besoin"),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6 } },
              CATEGORIES.map(cat => React.createElement("button", {
                key: cat.id, onClick: () => setConfirm({ ...confirm, categorie: cat.id }),
                style: { padding: "8px 4px", borderRadius: 8, border: "1.5px solid", borderColor: confirm.categorie === cat.id ? cat.color : "#eee", background: confirm.categorie === cat.id ? cat.color + "22" : "#fff", cursor: "pointer", textAlign: "center" }
              },
                React.createElement("div", { style: { fontSize: 18 } }, cat.emoji),
                React.createElement("div", { style: { fontSize: 9, marginTop: 2, fontWeight: 600, color: "#444", lineHeight: 1.2 } }, cat.label)
              ))
            )
          ),

          React.createElement("div", { style: { display: "flex", gap: 8 } },
            React.createElement("button", { onClick: () => setConfirm(null), style: { flex: 1, padding: 12, background: "#F0EDE9", border: "none", borderRadius: 10, fontSize: 13, fontWeight: 700, color: "#888", cursor: "pointer" } }, "Annuler"),
            React.createElement("button", { onClick: confirmerVocal, style: { flex: 2, padding: 12, background: "#A1607D", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, color: "#fff", cursor: "pointer" } }, "✓ Confirmer")
          )
        ),

        // Vocal (si pas de confirm en cours)
        !confirm && React.createElement("div", { style: { ...card, textAlign: "center" } },
          React.createElement("div", { style: { fontSize: 13, fontWeight: 700, marginBottom: 12 } }, "Saisie vocale"),
          React.createElement("button", {
            onClick: startListening, disabled: isListening,
            className: isListening ? "pulsing" : "",
            style: { width: 68, height: 68, borderRadius: "50%", background: "#A1607D", border: "none", cursor: "pointer", fontSize: 26, boxShadow: "0 4px 16px rgba(161,96,125,0.35)" }
          }, "🎙️"),
          React.createElement("div", { style: { marginTop: 8, fontSize: 12, color: "#999" } }, isListening ? "J'écoute..." : "Ex: \"25€ d'essence chez Total\"")
        ),

        // Manuel
        !confirm && React.createElement("div", { style: card },
          React.createElement("div", { style: { fontSize: 13, fontWeight: 700, marginBottom: 14 } }, "Saisie manuelle"),
          React.createElement("div", { style: { marginBottom: 12 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 4 } }, "Montant (€)"),
            React.createElement("input", { type: "number", placeholder: "0.00", value: form.montant, onChange: e => setForm({ ...form, montant: e.target.value }), style: { width: "100%", padding: "10px 12px", border: "1.5px solid #eee", borderRadius: 8, fontSize: 16, fontWeight: 700 } })
          ),
          React.createElement("div", { style: { marginBottom: 12 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 6 } }, "Catégorie"),
            React.createElement("div", { style: { display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6 } },
              CATEGORIES.map(cat => React.createElement("button", {
                key: cat.id, onClick: () => setForm({ ...form, categorie: cat.id }),
                style: { padding: "8px 4px", borderRadius: 8, border: "1.5px solid", borderColor: form.categorie === cat.id ? cat.color : "#eee", background: form.categorie === cat.id ? cat.color + "22" : "#fff", cursor: "pointer", textAlign: "center" }
              },
                React.createElement("div", { style: { fontSize: 18 } }, cat.emoji),
                React.createElement("div", { style: { fontSize: 9, marginTop: 2, fontWeight: 600, color: "#444", lineHeight: 1.2 } }, cat.label)
              ))
            )
          ),
          React.createElement("div", { style: { marginBottom: 14 } },
            React.createElement("label", { style: { fontSize: 11, color: "#888", display: "block", marginBottom: 4 } }, "Marchand (optionnel)"),
            React.createElement("input", { type: "text", placeholder: "Ex: Lidl, RATP...", value: form.marchand, onChange: e => setForm({ ...form, marchand: e.target.value }), style: { width: "100%", padding: "10px 12px", border: "1.5px solid #eee", borderRadius: 8, fontSize: 14 } })
          ),
          React.createElement("button", { onClick: ajouterManuel, style: { width: "100%", padding: 13, background: "#A1607D", color: "#fff", border: "none", borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: "pointer" } }, "Ajouter cette dépense")
        )
      )
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
